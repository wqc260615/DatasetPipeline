slicing:
  # --- Tag-Distance + DP settings ---
  target_slices: 20
  distance_weights:
    lines: 0.45
    files: 0.45
    api_break: 0.10
  segment_gain: "log1p"             # log1p | sqrt
  force_first_release_tag: true
  min_days_between_selected: 0      # 0 = no constraint
  api_break:
    python_backend: "ast_symbol_diff"
    java_backend: "refactoring_miner"

parsing:
  languages: ["python", "java"]
  timeout_seconds: 30
  supported_extensions:
    python: [".py"]
    java: [".java"]

storage:
  output_dir: "./data/slices"
  cache_dir: "./data/cache"
  repositories_dir: "./data/repositories"
  existing_repo_action: "ask"   # ask | update | skip

repository_selection:
  min_commits: 100
  max_commits: 50000
  min_commits_per_year: 10
  required_languages: ["python", "java"]
  library_percentage: 0.6
  application_percentage: 0.4
  permissive_licenses: ["MIT", "Apache-2.0", "BSD-2-Clause", "BSD-3-Clause"]

validation:
  min_code_files_per_slice: 1
  ast_parsing_success_rate_threshold: 0.5
  enable_build_check: false  # compilation test

logging:
  level: "INFO"
  format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
